        /* Mesh Background */
        .mesh-bg {

        /* Sidebar Styling */
        .sidebar-link {
            border-left: 2px solid transparent;

            background: rgba(255, 255, 255, 0.03);

        /* Code Block Styling */
        pre[class*="language-"] {
            background: #0d0d0d !important;
            border: 1px solid #1f1f1f;
            border-radius: 0.75rem;
            margin: 1.5rem 0;
            padding-top: 2.5rem !important; /* Space for traffic lights */
            position: relative;
        }
        
        /* Mac-style Traffic Lights */
        pre[class*="language-"]::before {
            content: "";
            position: absolute;
            top: 15px; left: 15px;
            width: 10px; height: 10px;
            background: #ff5f56;
            border-radius: 50%;
            box-shadow: 20px 0 0 #ffbd2e, 40px 0 0 #27c93f;
        }

        /* Content Animations */
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    <script>
        const content = {
            intro: `
                <div class="mb-2 text-bans font-bold tracking-widest text-xs uppercase">Getting Started</div>
                <h1 class="text-4xl md:text-5xl font-bold text-white mb-6 tracking-tight">Introduction</h1>
                <p class="text-lg leading-relaxed text-gray-300 mb-8">
                    ControlBans is a high-performance moderation suite designed for scale. Unlike legacy punishment plugins, it is built with an <strong>asynchronous-first</strong> architecture, ensuring that database lookups never freeze your main thread, even under heavy load.
                </p>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
                    <div class="bg-panel border border-border p-6 rounded-xl hover:border-bans/40 transition">
                        <i class="fa-solid fa-bolt text-2xl text-yellow-500 mb-3"></i>
                        <h3 class="text-white font-bold mb-2">Zero Lag</h3>
                        <p class="text-sm">All I/O operations are off-thread. Supports caffeine caching for sub-millisecond lookups.</p>
                    </div>
                    <div class="bg-panel border border-border p-6 rounded-xl hover:border-bans/40 transition">
                        <i class="fa-solid fa-server text-2xl text-red-500 mb-3"></i>
                        <h3 class="text-white font-bold mb-2">Redis Sync</h3>
                        <p class="text-sm">Instant synchronization across BungeeCord, Velocity, and Folia instances via Pub/Sub.</p>
                    </div>
                    <div class="bg-panel border border-border p-6 rounded-xl hover:border-bans/40 transition">
                        <i class="fa-solid fa-microphone text-2xl text-purple-500 mb-3"></i>
                        <h3 class="text-white font-bold mb-2">Voice Chat Muting</h3>
                        <p class="text-sm">Native integration with Simple Voice Chat to mute players' microphones.</p>
                    </div>
                    <div class="bg-panel border border-border p-6 rounded-xl hover:border-bans/40 transition">
                        <i class="fa-solid fa-leaf text-2xl text-green-500 mb-3"></i>
                        <h3 class="text-white font-bold mb-2">Folia Native</h3>
                        <p class="text-sm">Designed correctly for Folia's region scheduler (no "global scheduler" hacks).</p>
                    </div>
                </div>
            `,
            install: `
                <div class="mb-2 text-bans font-bold tracking-widest text-xs uppercase">Getting Started</div>
                <h1 class="text-4xl font-bold text-white mb-8">Installation</h1>

                <div class="border-l-4 border-bans pl-6 mb-10">
                    <h3 class="text-white font-bold mb-2">Requirements</h3>
                    <ul class="list-disc list-inside text-gray-400 space-y-1">
                        <li>Java 21 or newer</li>
                        <li>Spigot, Paper, Purpur, or Folia (1.16 - 1.21+)</li>
                        <li>(Optional) BungeeCord or Velocity for proxies</li>
                    </ul>
                </div>

                <h3 class="text-2xl font-bold text-white mb-4">Single Server Setup</h3>
                <ol class="space-y-4 mb-12 text-gray-300">
                    <li class="flex gap-4">
                        <span class="bg-border w-8 h-8 rounded-full flex items-center justify-center font-mono text-sm text-white shrink-0">1</span>
                        <div>Download <code class="text-bans bg-white/5 px-1.5 py-0.5 rounded border border-white/5">ControlBans.jar</code> from the releases page.</div>
                    </li>
                    <li class="flex gap-4">
                        <span class="bg-border w-8 h-8 rounded-full flex items-center justify-center font-mono text-sm text-white shrink-0">2</span>
                        <div>Drop the file into your <code class="text-bans bg-white/5 px-1.5 py-0.5 rounded border border-white/5">/plugins/</code> folder.</div>
                    </li>
                    <li class="flex gap-4">
                        <span class="bg-border w-8 h-8 rounded-full flex items-center justify-center font-mono text-sm text-white shrink-0">3</span>
                        <div>Restart the server. A default <code class="text-gray-400">config.yml</code> and SQLite database will be created.</div>
                    </li>
                </ol>

                <h3 class="text-2xl font-bold text-white mb-4">Network Setup (Proxy)</h3>
                <p class="mb-4">To sync bans across servers, you must install the plugin on <strong>ALL</strong> backend servers (Spigot/Paper) <strong>AND</strong> the proxy (Velocity/Bungee).</p>
                <div class="bg-yellow-500/10 border border-yellow-500/20 p-4 rounded-lg mb-6 flex gap-3">
                    <i class="fa-solid fa-triangle-exclamation text-yellow-500 mt-1"></i>
                    <div>
                        <strong class="text-white block mb-1">Database Required</strong>
                        For cross-server sync, you must use MySQL/MariaDB/PostgreSQL or MongoDB. SQLite cannot sync across servers. Redis is highly recommended for instant updates.
                    </div>
                </div>
            `,
            migration: `
                <div class="mb-2 text-bans font-bold tracking-widest text-xs uppercase">Getting Started</div>
                <h1 class="text-4xl font-bold text-white mb-6">Migrating Data</h1>
                <p class="mb-6">ControlBans includes a powerful import engine that can read data from other plugins without overwriting your current database.</p>

                <h3 class="text-xl font-bold text-white mb-4">Supported Sources</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                    <div class="bg-panel border border-border p-4 rounded-lg text-center">
                        <div class="font-bold text-white">Essentials</div>
                        <div class="text-xs text-gray-500 mt-1">Userdata (YAML)</div>
                    </div>
                    <div class="bg-panel border border-border p-4 rounded-lg text-center">
                        <div class="font-bold text-white">LiteBans</div>
                        <div class="text-xs text-gray-500 mt-1">MySQL or SQLite</div>
                    </div>
                    <div class="bg-panel border border-border p-4 rounded-lg text-center">
                        <div class="font-bold text-white">AdvancedBan</div>
                        <div class="text-xs text-gray-500 mt-1">MySQL</div>
                    </div>
                </div>

                <h3 class="text-xl font-bold text-white mb-4">How to Import</h3>
                <div class="space-y-6">
                    <div>
                        <div class="text-white font-bold mb-2">1. Configure Source</div>
                        <p class="mb-2">Open <code class="text-bans">config.yml</code> and scroll to the bottom.</p>
                        <pre><code class="language-yaml">import:
  sources:
    litebans:
      type: mysql
      host: 127.0.0.1
      port: 3306
      database: litebans
      username: root
      password: "password"</code></pre>
                    </div>
                    <div>
                        <div class="text-white font-bold mb-2">2. Run Command</div>
                        <p class="mb-2">The import process runs asynchronously and throttles itself to prevent lag.</p>
                        <pre><code class="language-bash">/controlbans import litebans</code></pre>
                    </div>
                </div>
            `,
            config: `
                <div class="mb-2 text-bans font-bold tracking-widest text-xs uppercase">Configuration</div>
                <h1 class="text-4xl font-bold text-white mb-6">Main Configuration</h1>
                <p class="mb-6">The <code class="text-bans">config.yml</code> file controls almost every aspect of the plugin.</p>

                <h3 class="text-xl font-bold text-white mb-4">Core Settings</h3>
                <pre><code class="language-yaml"># Language file to use (locales/en.yml)
language: "en"

# Database Backend (sqlite, mysql, mongodb, postgresql)
database:
  type: sqlite
  # ... connection details ...

# Redis for Cross-Server Sync
redis:
  enabled: false
  host: localhost
  port: 6379
  pubsub: true # Required for instant notifications

# Punishment Defaults
punishments:
  broadcast:
    enabled: true
    silent-by-default: false
  default-reasons:
    ban: "Unspecified"
    mute: "Unspecified"</code></pre>
            `,
            database: `
                <div class="mb-2 text-bans font-bold tracking-widest text-xs uppercase">Configuration</div>
                <h1 class="text-4xl font-bold text-white mb-6">Database Setup</h1>
                
                <h3 class="text-xl font-bold text-white mt-6 mb-2">SQL (MySQL / MariaDB / PostgreSQL)</h3>
                <p class="text-gray-400 mb-4">Required for BungeeCord/Velocity synchronization. Tables are created automatically.</p>
                <pre><code class="language-yaml">database:
  type: mysql
  host: localhost
  port: 3306
  name: controlbans
  username: root
  password: password
  
  # HikariCP Settings (Advanced)
  pool:
    maximum-pool-size: 10
    connection-timeout: 30000</code></pre>

                <h3 class="text-xl font-bold text-white mt-8 mb-2">MongoDB (NoSQL)</h3>
                <p class="text-gray-400 mb-4">ControlBans supports MongoDB natively for high-performance logging.</p>
                <pre><code class="language-yaml">database:
  type: mongodb
  mongodb:
    connection-string: "mongodb://localhost:27017"
    database: controlbans</code></pre>
            `,
            redis: `
                <div class="mb-2 text-bans font-bold tracking-widest text-xs uppercase">Configuration</div>
                <h1 class="text-4xl font-bold text-white mb-6">Redis Synchronization</h1>
                <p class="mb-6">Redis is critical for instant cross-server updates. Without Redis, punishment updates rely on player login events or database polling (which is slower).</p>

                <h3 class="text-xl font-bold text-white mb-2">Configuration</h3>
                <pre><code class="language-yaml">redis:
  enabled: true
  host: 127.0.0.1
  port: 6379
  password: "secure_password"
  pubsub: true # Must be true for instant alerts</code></pre>

                <div class="bg-blue-500/10 border border-blue-500/20 p-4 rounded-lg mt-6">
                    <i class="fa-solid fa-info-circle text-blue-500 mr-2"></i>
                    <strong>Pro Tip:</strong> Redis allows the plugin to instantly kick a player from a different server the moment you type <code>/ban</code>.
                </div>
            `,
            punishments: `

                <h1 class="text-4xl font-bold text-white mb-6">Punishment Types</h1>
                <p class="mb-6 text-gray-400">ControlBans separates punishments into distinct tracking tables for granular control.</p>

                <div class="space-y-4">
                    <div class="p-4 bg-panel rounded border border-border">
                        <div class="font-bold text-white text-lg mb-1">Ban / TempBan</div>
                        <p class="text-sm">Prevents connection. Checks UUID and IP (if IP Ban is used).</p>
                    </div>
                    <div class="p-4 bg-panel rounded border border-border">
                        <div class="font-bold text-white text-lg mb-1">Mute / TempMute</div>
                        <p class="text-sm">Prevents chat. Caches the mute status locally to ensure 0ms latency on chat events.</p>
                    </div>
                    <div class="p-4 bg-panel rounded border border-border">
                        <div class="font-bold text-white text-lg mb-1">Voice Mute</div>

                    </div>
                    <div class="p-4 bg-panel rounded border border-border">
                        <div class="font-bold text-white text-lg mb-1">Void Jail</div>
                        <p class="text-sm">Teleports player to a specific location and disables commands/interaction. Good for trolls.</p>
                    </div>
                </div>
            `,
            voicechat: `
                <div class="mb-2 text-purple-500 font-bold tracking-widest text-xs uppercase">Features</div>
                <h1 class="text-4xl font-bold text-white mb-6">Voice Chat Muting</h1>
                <p class="mb-6">ControlBans integrates natively with <strong>Simple Voice Chat</strong>. Muted players cannot speak in proximity chat.</p>

                <div class="bg-purple-500/10 border border-purple-500/20 p-6 rounded-xl mb-8">
                    <h3 class="text-white font-bold mb-2">How it works</h3>
                    <p class="text-sm">
                        1. Admin runs <code class="text-purple-400 bg-black/30 px-1 rounded">/voicemute &lt;player&gt;</code>.<br>
                        2. ControlBans intercepts the Voice Chat packet.<br>
                        3. The player sees a BossBar indicating they are muted.<br>

                        <tr><td class="p-3 font-mono text-purple-400">/tempvoicemute</td><td class="p-3">Temporarily mute voice.</td></tr>
                        <tr><td class="p-3 font-mono text-purple-400">/voiceunmute</td><td class="p-3">Restore voice privileges.</td></tr>
                    </tbody>

            voidjail: `
                <div class="mb-2 text-control font-bold tracking-widest text-xs uppercase">Features</div>

                <h3 class="text-xl font-bold text-white mb-4">Setup</h3>
                <ol class="space-y-4 mb-8 text-gray-300">

                    <li>Open <code class="text-bans">config.yml</code> and edit the section below:</li>

                <pre><code class="language-yaml">void-jail:
  location:
    world: "world_the_end"
    x: 0.5
    y: 100.0
    z: 0.5
  allowed-commands:
    - "msg"
    - "appeal"</code></pre>

                <h1 class="text-4xl font-bold text-white mb-6">AutoMod (Regex)</h1>

                <pre><code class="language-yaml">automod:
  enabled: true
  rules:
    links:
      pattern: "(https?://)?(www\\.)?..."
      action: CANCEL
      message: "Links are not allowed."
    bad_word:

        // Navigation Logic
        function nav(pageId) {
            const container = document.getElementById('main-content');
            const data = content[pageId] || "<h1 class='text-4xl text-control'>404 Not Found</h1><p>The documentation for this section is currently being updated.</p>";
            
            // Fade out
            container.style.opacity = '0';
            container.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                container.innerHTML = data;
                Prism.highlightAll(); // Re-run syntax highlighting
                
                // Fade in
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
                container.style.transition = 'all 0.3s cubic-bezier(0.16, 1, 0.3, 1)';
            }, 200);

            // Update Active State
            document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
            document.getElementById('link-' + pageId)?.classList.add('active');

            // Scroll to top
            document.getElementById('content-scroll').scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Mobile Menu
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-sidebar');
            const linksContainer = document.getElementById('mobile-links');
            
            if (menu.classList.contains('hidden')) {
                // Clone sidebar content to mobile menu
                const sidebarContent = document.querySelector('#sidebar > div').innerHTML;
                linksContainer.innerHTML = sidebarContent;
                
                // Add click handlers to cloned links to close menu
                linksContainer.querySelectorAll('button').forEach(btn => {
                    const originalFn = btn.getAttribute('onclick');
                    btn.setAttribute('onclick', originalFn + '; toggleMobileMenu()');
                });

                menu.classList.remove('hidden');
                menu.classList.add('flex');
            } else {
                menu.classList.add('hidden');
                menu.classList.remove('flex');
            }
        }

        // Search Logic
        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.sidebar-link').forEach(btn => {
                const text = btn.innerText.toLowerCase();
                const parentLi = btn.parentElement;
                
                if (text.includes(term)) {
                    parentLi.style.display = 'block';
                } else {
                    parentLi.style.display = 'none';
                }
            });
        });

        // Initialize
        nav('intro');

    </script>
